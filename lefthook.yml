pre-commit:
  parallel: true
  commands:
    terraform-fmt:
      glob: "*.tf"
      run: terraform fmt -check -diff {staged_files}
    actionlint:
      glob: ".github/workflows/*.yml"
      run: actionlint {staged_files}

pre-push:
  parallel: true
  commands:
    terraform-validate:
      glob: "*.tf"
      run: |
        for dir in $(find . -name '*.tf' -exec dirname {} \; | sort -u); do
          terraform -chdir="$dir" validate
        done
    terraform-trivy:
      glob: "*.tf"
      run: |
        for dir in $(find . -name '*.tf' -exec dirname {} \; | sort -u); do
          trivy config --exit-code 1 "$dir"
        done
    actionlint-all:
      glob: ".github/workflows/*.yml"
      run: actionlint

commit-msg:
  commands:
    conventional-commit:
      run: |
        msg=$(head -1 "$1")
        if ! echo "$msg" | grep -qE '^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\(.+\))?\!?:\ .+'; then
          echo "ERROR: Commit message must follow Conventional Commits format"
          echo "  Expected: <type>(<scope>): <description>"
          echo "  Got: $msg"
          exit 1
        fi
