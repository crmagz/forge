# Example: consumer workflow that calls Forge's Java build pipeline.
# Place in .github/workflows/ of your repo.
#
# Prerequisites:
#   - GitHub environment (e.g., dev) with AWS OIDC configured
#   - vars.AWS_BUILD_ROLE_ARN set in the environment
#   - Gradle wrapper (./gradlew) committed to repo
#   - gradle.properties with a version field

name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    uses: crmagz/forge/.github/workflows/build-java.yml@build/v1
    with:
      environment: dev
      java-version: "21"
      java-distribution: temurin
      ecr-repository: my-java-app
      platforms: "linux/arm64"
