version: "3"

tasks:
  calculate-version:
    desc: Calculate next semantic version from git tags and conventional commits
    cmds:
      - |
        mapfile -t pathspecs < <(bash {{.ROOT_DIR}}/.github/actions/semantic-version/parse-pathspecs.sh <<< "${SEMVER_PATHS:-}")
        bash {{.ROOT_DIR}}/.github/actions/semantic-version/calculate-version.sh "${TAG_PREFIX:-}" "${pathspecs[@]}"

  test-semantic-version:
    desc: Run semantic version truth-table tests
    cmds:
      - bash {{.ROOT_DIR}}/tests/semantic-version/test-truth-table.sh

  test-release-notes:
    desc: Run release note path-filter tests
    cmds:
      - bash {{.ROOT_DIR}}/tests/semantic-version/test-release-notes.sh

  test:
    desc: Run all release automation tests
    cmds:
      - task: test-semantic-version
      - task: test-release-notes
      - task: test-workflow-contract

  test-workflow-contract:
    desc: Verify reusable workflow and composite-action pathscope contracts
    cmds:
      - bash {{.ROOT_DIR}}/tests/semantic-version/test-workflow-contract.sh

  generate-release-notes:
    desc: Generate release notes from conventional commits
    cmds:
      - |
        mapfile -t pathspecs < <(bash {{.ROOT_DIR}}/.github/actions/semantic-version/parse-pathspecs.sh <<< "${SEMVER_PATHS:-}")
        bash {{.ROOT_DIR}}/.github/actions/release/generate-release-notes.sh "${PREVIOUS_TAG:-}" "${CURRENT_REF:-HEAD}" "${pathspecs[@]}"

  ensure-tag:
    desc: Ensure git tag exists on current commit (idempotent — safe to rerun)
    cmds:
      - |
        : "${VERSION:?VERSION must be set}"
        tag="${TAG_PREFIX:-}v${VERSION}"
        current_sha=$(git rev-parse HEAD)

        git config user.name "${GIT_USER_NAME:-github-actions[bot]}"
        git config user.email "${GIT_USER_EMAIL:-github-actions[bot]@users.noreply.github.com}"

        if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
          tag_sha=$(git rev-list -n 1 "${tag}")
          if [ "$tag_sha" != "$current_sha" ]; then
            echo "ERROR: Tag ${tag} already exists on commit ${tag_sha}, but current commit is ${current_sha}."
            exit 1
          fi
          echo "Tag ${tag} already exists on current commit. Continuing."
        else
          git tag -a "${tag}" -m "Release ${tag}"
          git push origin "${tag}"
          echo "Created and pushed tag ${tag}."
        fi

  ensure-github-release:
    desc: Ensure GitHub release exists for the tag (idempotent — safe to rerun)
    cmds:
      - |
        : "${VERSION:?VERSION must be set}"
        tag="${TAG_PREFIX:-}v${VERSION}"

        if gh release view "${tag}" >/dev/null 2>&1; then
          echo "GitHub release ${tag} already exists. Continuing."
        else
          mapfile -t pathspecs < <(bash {{.ROOT_DIR}}/.github/actions/semantic-version/parse-pathspecs.sh <<< "${SEMVER_PATHS:-}")
          bash {{.ROOT_DIR}}/.github/actions/release/generate-release-notes.sh "${PREVIOUS_TAG:-}" HEAD "${pathspecs[@]}" > /tmp/forge-release-notes.md
          gh release create "${tag}" --title "${tag}" --notes-file /tmp/forge-release-notes.md
          echo "Created GitHub release ${tag}."
        fi

  release:
    desc: Full release — ensure tag and GitHub release exist
    cmds:
      - task: ensure-tag
      - task: ensure-github-release
