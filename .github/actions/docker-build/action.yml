name: Docker Build
description: Build and push Docker image with Buildx and registry caching

inputs:
  registry:
    description: "Container registry URL"
    required: true
  repository:
    description: "Image repository name"
    required: true
  tag:
    description: "Primary image tag"
    required: true
  tag-latest:
    description: "Also tag as latest"
    default: "false"
  dockerfile:
    description: "Path to Dockerfile"
    default: "Dockerfile"
  context:
    description: "Docker build context"
    default: "."
  platforms:
    description: "Target platforms"
    default: "linux/arm64"
  build-args:
    description: "Newline-separated build arguments"
    default: ""
  cache-registry:
    description: "Registry ref for buildx cache (e.g., registry/repo:buildcache)"
    default: ""

runs:
  using: composite
  steps:
    - name: Setup QEMU
      uses: docker/setup-qemu-action@v3

    - name: Setup Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and push
      shell: bash
      run: |
        build_args=""
        if [ -n "${{ inputs.build-args }}" ]; then
          while IFS= read -r arg; do
            [ -n "$arg" ] && build_args="$build_args --build-arg $arg"
          done <<< "${{ inputs.build-args }}"
        fi

        cache_args=""
        if [ -n "${{ inputs.cache-registry }}" ]; then
          cache_args="--cache-from type=registry,ref=${{ inputs.cache-registry }} --cache-to type=registry,ref=${{ inputs.cache-registry }},mode=max"
        fi

        latest_args=""
        if [ "${{ inputs.tag-latest }}" = "true" ]; then
          latest_args="--tag ${{ inputs.registry }}/${{ inputs.repository }}:latest"
        fi

        docker buildx build \
          --platform ${{ inputs.platforms }} \
          --file ${{ inputs.dockerfile }} \
          --tag ${{ inputs.registry }}/${{ inputs.repository }}:${{ inputs.tag }} \
          $latest_args \
          $build_args \
          $cache_args \
          --push \
          ${{ inputs.context }}
